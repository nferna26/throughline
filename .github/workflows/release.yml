name: Release

# Triggered by pushing a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"

jobs:
  build-dmg:
    runs-on: macos-latest
    permissions:
      contents: write # needed to create the GitHub Release + upload the .dmg
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Build a universal binary so the .dmg runs on both Apple Silicon and Intel.
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS dependencies
        run: npm ci

      - name: Build + bundle + sign + notarize + publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ── Updater signing (REQUIRED) ──
          # tauri.conf has createUpdaterArtifacts: true, so the bundle step signs
          # the .app.tar.gz with this minisign key and writes latest.json. Without
          # it the build FAILS. Set TAURI_SIGNING_PRIVATE_KEY to the contents of
          # ~/.throughline-updater.key; password is empty (as generated). See
          # docs/DISTRIBUTION.md. The matching public key is baked into tauri.conf.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # ── macOS code signing + notarization ──
          # tauri-action signs + notarizes automatically when these are present.
          # If the repo has no signing secrets set, all of these resolve to empty
          # strings and the build falls back to UNSIGNED (still produces a .dmg,
          # but first-open needs right-click → Open). See docs/SIGNING.md for the
          # one-time setup that populates these secrets.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Throughline ${{ github.ref_name }}"
          # Shown on the GitHub release page (also where the website's Download
          # button can point). The .dmg is a universal binary — one download runs
          # on both Apple Silicon and Intel Macs.
          releaseBody: |
            **Install:** open the `.dmg` and drag **Throughline** into your Applications folder.

            Runs on macOS 11+ (Apple Silicon and Intel). See CHANGELOG.md for what changed.
          # PUBLISHED on tag, never a draft. The in-app updater only sees
          # published releases (the endpoint resolves to /releases/latest), and
          # a draft left unpublished strands every shipped reader on a 404 —
          # which is exactly what happened for v0.1.0–v0.4.0 (CORE-1073).
          # Review happens BEFORE tagging; pushing the tag is the release.
          # See docs/DISTRIBUTION.md.
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin

      # ── Notarize the .dmg itself ──
      # tauri-action notarizes + staples the .app (so the auto-update payload and
      # the app inside the dmg pass Gatekeeper), but it does NOT notarize the .dmg
      # CONTAINER. A website download arrives quarantined, and an un-notarized dmg
      # triggers "can't be opened because Apple cannot check it for malicious
      # software" on first double-click. So we notarize + staple the dmg here and
      # replace the asset on the release. Verified necessary: spctl reports
      # the un-notarized dmg as "rejected, source=Unnotarized Developer ID".
      # Auto-skips if the Apple secrets aren't set (the unsigned fallback build).
      - name: Notarize + staple the .dmg (website download must pass Gatekeeper)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_ID:-}" ] || [ -z "${APPLE_PASSWORD:-}" ] || [ -z "${APPLE_TEAM_ID:-}" ]; then
            echo "Apple notary credentials not set — skipping .dmg notarization (unsigned build)."
            exit 0
          fi
          DMG=$(find src-tauri/target -path '*bundle/dmg/*.dmg' | head -1)
          if [ -z "$DMG" ]; then echo "::error::no .dmg found to notarize"; exit 1; fi
          echo "Notarizing $DMG"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"
          echo "Re-uploading the stapled .dmg over the release asset"
          gh release upload "${{ github.ref_name }}" "$DMG" --clobber -R "${{ github.repository }}"
          echo "✓ .dmg notarized, stapled, re-uploaded"

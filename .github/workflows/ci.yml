name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    # Throughline hard-codes macOS data paths (~/Library/Application Support),
    # so CI runs on macOS only. See README "Platform support".
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS dependencies
        run: npm ci

      - name: Version consistency (tauri.conf / package.json / Cargo.toml)
        run: npm run version:check

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Frontend build
        run: npm run build

      - name: Frontend tests (Vitest)
        run: npm test

      - name: Rust tests (lib + integration)
        working-directory: src-tauri
        run: cargo test --all-targets

      - name: Golden loop (offline acceptance, isolated data dir)
        working-directory: src-tauri
        run: cargo run --example stage2_golden_loop

      - name: Rust lint (clippy)
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Rust format check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Rust build (production binary)
        working-directory: src-tauri
        run: cargo build --bin throughline

      - name: Dependency audit (advisory, non-blocking)
        run: npm audit --audit-level=high
        continue-on-error: true
